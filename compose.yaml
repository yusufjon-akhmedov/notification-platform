services:
  postgres:
    image: postgres:16
    container_name: notification-platform-postgres
    environment:
      POSTGRES_DB: notification_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - notification_platform_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  notification_platform_pgdata: